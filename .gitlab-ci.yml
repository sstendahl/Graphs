include:
  - project: "GNOME/citemplates"
    file: "flatpak/flatpak_ci_initiative.yml"

stages:
  - .pre
  - build
  - test

.flatpak-vars:
  image: quay.io/gnome_infrastructure/gnome-runtime-images:gnome-50
  interruptible: true
  variables:
    MANIFEST_PATH: build-aux/flatpak/se.sjoerd.Graphs.json
    FLATPAK_MODULE: graphs
    APP_ID: se.sjoerd.Graphs
    RUNTIME_REPO: "https://nightly.gnome.org/gnome-nightly.flatpakrepo"
    CI_IMAGE_X86_64: "quay.io/gnome_infrastructure/gnome-runtime-images:gnome-master"
    BUNDLE: "se.sjoerd.Graphs.flatpak"
  rules:
    # Disable merge request runs
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: never

    # Allow main branch
    - if: $CI_COMMIT_BRANCH == "main"
      when: on_success

    # Allow version branches like v1.8.x, v2.0.x, etc.
    - if: $CI_COMMIT_BRANCH =~ /^v\d+\.\d+\.x$/
      when: on_success

    - when: never

.build:
  image: fedora:latest
  stage: build
  interruptible: true
  before_script:
    - dnf install -y gcc vala meson python3 python3-pip
    - dnf install -y glib2-devel gtk4-devel libgee-devel libadwaita-devel libsq3-devel
    - pip install -r requirements.txt
  script:
    - meson setup build
    - meson compile -C build
  artifacts:
    paths:
      - build/
    expire_in: 1 day

# Build for x86_64
build@x86_64:
  extends:
    - .build

# Build for aarch64
build@aarch64:
  extends:
    - .build

.test:
  image: fedora:latest
  stage: test
  interruptible: true
  before_script:
    - dnf install -y meson pytest
    - pip install -r requirements.txt
  script:
    - meson test -C build

# Test for x86_64
test@x86_64:
  extends:
    - .test
  needs:
    - job: build@x86_64
      artifacts: true

# Test for aarch64
test@aarch64:
  extends:
    - .test
  needs:
    - job: build@aarch64
      artifacts: true

# Build Flatpak for x86_64
flatpak@x86_64:
  stage: build
  extends:
    - .flatpak@x86_64
    - .flatpak-vars

# Build Flatpak for aarch64
flatpak@aarch64:
  stage: build
  extends:
    - .flatpak@aarch64
    - .flatpak-vars

python-lint:
  image: python:3.12.6
  stage: .pre
  before_script:
    - pip install flake8 flake8-docstrings flake8-simplify flake8-unused-arguments flake8-quotes flake8-bugbear flake8-pie flake8-print flake8-warnings flake8-commas flake8-builtins flake8-import-order pep8-naming
  script:
    - flake8

vala-lint:
  image: "valalang/lint:latest"
  stage: .pre
  script:
    - io.elementary.vala-lint graphs

potfiles:
  stage: .pre
  script:
    - |
      while read -r file; do
        [[ -z "$file" || "$file" == \#* ]] && continue

        if [ ! -f "$file" ]; then
          echo "Potfiles missing file $file"
          exit 1
        fi
      done < po/POTFILES.in
